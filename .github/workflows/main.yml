name: Playwright VPS Test
on: 
  push:
  workflow_dispatch: # This is for n8n and manual triggers

jobs:
  playwright-runner:      # Your original, preferred name
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Playwright
        run: |
          # Use the persistent venv we made on the VPS home dir
          source ~/venv-playwright/bin/activate
          python3 playground-plr.py