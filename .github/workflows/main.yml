name: Playwright VPS Test
on: [push]

jobs:
  playwright-test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Playwright
        run: |
          # Use the persistent venv we made on the VPS home dir
          source ~/venv-playwright/bin/activate
          
          # Run the script (no more install steps!)
          python3 playground-plr.py